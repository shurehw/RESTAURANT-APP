name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import boundary check
        run: npm run check:boundaries

      - name: Stale reference check
        run: npm run check:refs

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  e2e-swarm:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run swarm (dashboard/manager/vendor)
        run: npm run test:e2e:swarm:all
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          E2E_DASHBOARD_EMAIL: ${{ secrets.E2E_DASHBOARD_EMAIL }}
          E2E_DASHBOARD_PASSWORD: ${{ secrets.E2E_DASHBOARD_PASSWORD }}
          E2E_MANAGER_EMAIL: ${{ secrets.E2E_MANAGER_EMAIL }}
          E2E_MANAGER_PASSWORD: ${{ secrets.E2E_MANAGER_PASSWORD }}
          E2E_VENDOR_EMAIL: ${{ secrets.E2E_VENDOR_EMAIL }}
          E2E_VENDOR_PASSWORD: ${{ secrets.E2E_VENDOR_PASSWORD }}
          E2E_HOST_EMAIL: ${{ secrets.E2E_HOST_EMAIL }}
          E2E_HOST_PASSWORD: ${{ secrets.E2E_HOST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
